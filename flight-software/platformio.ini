; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = featheresp32
framework = arduino
board_build.f_cpu = 240000000L
monitor_speed = 115200
upload_speed = 115200
monitor_echo = true
monitor_filters = send_on_enter, colorize, time

[env:test-radio]
build_src_filter = -<*> +<tests/test-radio/*>
;lib_deps = askuric/Simple FOC@^2.4.0

[env:test-motor-openloop]
build_src_filter = -<*> +<tests/test-motor-openloop/*>
lib_deps = askuric/Simple FOC@^2.4.0

[env:test-mag-encoder]
build_src_filter = -<*> +<tests/test-mag-encoder/*>
lib_deps = askuric/Simple FOC@^2.4.0

[env:test-fc-blink]
board = esp32-s3-devkitc-1
build_src_filter = -<*> +<tests/test-fc-blink/*>
; needs USB print enabled
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1

[env:test-BMS]
platform = espressif32
board = esp32-s3-devkitc-1
build_src_filter = -<*> +<tests/test-BMS/*>
upload_speed = 921600

[env:i2c-scanner-test]
platform = espressif32
board = esp32-s3-devkitc-1
build_src_filter = -<*> +<tests/i2c-scanner-test/*>
upload_speed = 921600

[env:test-bq25798]
platform = espressif32
board = esp32-s3-devkitc-1
build_src_filter = -<*> +<tests/test-bq25798/*>
upload_speed = 921600
lib_deps =
  https://github.com/adafruit/Adafruit_BusIO.git
  https://github.com/adafruit/Adafruit_bq25798.git
